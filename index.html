<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Grille de Déduction</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&family=IBM+Plex+Mono:wght@400&display=swap" rel="stylesheet"/>

<style>
/* (STYLE IDENTIQUE — inchangé pour garder la lisibilité) */
:root{--bg:#0a0a0a;--bgr:#111;--tp:#e8e8e8;--ts:#a0a0a0;--tm:#686868;--bd:#2a2a2a;--bda:#555;--ac:#c8b896;--acd:#6b5e3f;--dg:#8b3a3a;--blk:#0d0d0d;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{min-height:100vh;background:var(--bg);color:var(--tp);font-family:'IBM Plex Mono',monospace;font-size:.85rem;padding:36px 20px 80px;display:flex;flex-direction:column;align-items:center;}
.wrap{width:100%;max-width:600px;}
.screen{display:none;}
.screen.active{display:block;}
.title{font-family:'Cormorant Garamond',serif;font-size:2.5rem;margin-bottom:4px;}
.sub{font-size:.6rem;margin-bottom:36px;color:var(--tm);}
.size-row{display:flex;gap:7px;margin-bottom:32px;}
.sz{flex:1;padding:13px;background:transparent;border:1px solid var(--bd);color:var(--tm);cursor:pointer;}
.sz.on{border-color:var(--acd);color:var(--ac);}
.btn-p{display:block;width:100%;max-width:320px;margin:0 auto;padding:13px;background:transparent;border:1px solid var(--bda);color:var(--ts);cursor:pointer;}
.btn-g{background:transparent;border:none;color:var(--tm);cursor:pointer;}
</style>
</head>

<body>
<div class="wrap">

<!-- ÉCRAN 1 -->
<div class="screen active" id="s0">
  <div class="title">Grille</div>
  <div class="sub">Outil de déduction</div>

  <span>Taille</span>
  <div class="size-row">
    <button class="sz on" onclick="setN(3,this)">3×3</button>
    <button class="sz" onclick="setN(4,this)">4×4</button>
  </div>

  <div id="cform"></div>

  <div style="margin-top:24px;">
    <button class="btn-p" onclick="openGrid()">Ouvrir la grille →</button>
  </div>
</div>

<!-- ÉCRAN 2 -->
<div class="screen" id="s1">
  <h2 id="gtitle">Grille</h2>
  <div id="gcont"></div>

  <div class="bact" style="margin-top:20px;">
    <button class="btn-g" onclick="back()">← Choix de la grille</button>
    <button class="btn-g" onclick="doReset()">Réinitialiser</button>
  </div>
</div>

</div>

<script>
let N=3, cats=[], cells={};

function setN(n,btn){
  if(n !== 3 && n !== 4) return; // sécurité
  N=n;
  document.querySelectorAll('.sz').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  renderForm();
}

function defCats(n){
  const base=[
    {name:'Suspects',items:Array.from({length:n},(_,i)=>`Suspect ${i+1}`)},
    {name:'Armes',items:Array.from({length:n},(_,i)=>`Arme ${i+1}`)},
    {name:'Lieux',items:Array.from({length:n},(_,i)=>`Lieu ${i+1}`)}
  ];
  if(n>=4)base.push({name:'Mobiles',items:Array.from({length:n},(_,i)=>`Mobile ${i+1}`)});
  return base;
}

function renderForm(){
  const defs=defCats(N);
  const f=document.getElementById('cform');
  f.innerHTML='';
  defs.forEach(cat=>{
    const div=document.createElement('div');
    div.innerHTML=`<p>${cat.name}</p>`;
    cat.items.forEach(it=>{
      const inp=document.createElement('input');
      inp.value=it;
      div.appendChild(inp);
    });
    f.appendChild(div);
  });
}

function openGrid(){
  document.getElementById('s0').classList.remove('active');
  document.getElementById('s1').classList.add('active');
}

function back(){
  document.getElementById('s1').classList.remove('active');
  document.getElementById('s0').classList.add('active');
}

function doReset(){
  location.reload();
}

renderForm();
</script>

</body>
</html>
